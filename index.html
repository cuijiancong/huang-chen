<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>婚宴邀请函</title>

<!-- 微信转发卡片 -->
<meta property="og:title" content="婚宴邀请函">
<meta property="og:description" content="诚挚邀请您见证我们的幸福时刻">
<meta property="og:image" content="https://your-domain.com/assets/images/share-cover.jpg">
<meta property="og:url" content="">
<meta property="og:type" content="website">

<!-- 微信 JSSDK（可选，需要公众号配置） -->
<!-- <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script> -->

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 背景音乐（src 由 config 注入） -->
<audio id="bgMusic" loop preload="auto"></audio>

<!-- 音乐控制按钮 -->
<button id="musicBtn" class="music-btn paused" onclick="toggleMusic()" aria-label="音乐播放/暂停">
  <span class="music-icon"></span>
</button>

<!-- 页面容器 -->
<div id="app" class="app-container">

  <!-- ====== 页面1：封面 ====== -->
  <section class="page page-cover active" id="page1">
    <div class="cover-bg"></div>
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <div class="cover-frame">
        <div class="cover-ornament top-ornament"></div>
        <p class="cover-subtitle" data-key="cover.subtitle"></p>
        <h1 class="cover-names">
          <span class="name-groom" data-key="cover.groom"></span>
          <span class="name-and">&amp;</span>
          <span class="name-bride" data-key="cover.bride"></span>
        </h1>
        <div class="cover-divider">
          <span class="divider-line"></span>
          <span class="divider-icon">♥</span>
          <span class="divider-line"></span>
        </div>
        <p class="cover-date" data-key="cover.date"></p>
        <p class="cover-slogan" data-key="cover.slogan"></p>
        <div class="cover-ornament bottom-ornament"></div>
      </div>
    </div>
    <div class="scroll-hint">
      <span class="scroll-text" data-key="cover.scrollHint"></span>
      <span class="scroll-arrow"></span>
    </div>
    <div class="petals-container" id="petals1"></div>
  </section>

  <!-- ====== 页面2：爱情故事 ====== -->
  <section class="page page-story" id="page2">
    <div class="story-bg"></div>
    <div class="section-inner">
      <h2 class="section-title">
        <span class="title-ornament">♥</span>
        <span data-key="story.title"></span>
        <span class="title-ornament">♥</span>
      </h2>
      <div class="story-text-area" id="storyTextArea"></div>
      <div class="story-photos" id="storyPhotos">
        <div class="story-photo-track" id="storyPhotoTrack"></div>
      </div>
      <div class="story-photo-dots" id="storyDots"></div>
    </div>
    <div class="petals-container" id="petals2"></div>
  </section>

  <!-- ====== 页面3：新郎特写 ====== -->
  <section class="page page-groom" id="page3">
    <div class="person-bg groom-bg-color"></div>
    <div class="person-photo-wrapper">
      <img id="groomPhoto" src="" alt="新郎" class="person-photo">
      <div class="person-photo-frame"></div>
    </div>
    <div class="person-overlay"></div>
    <div class="person-content">
      <div class="person-label" data-key="groom.title"></div>
      <h2 class="person-name" data-key="groom.name"></h2>
      <p class="person-subtitle" data-key="groom.subtitle"></p>
      <div class="person-divider">
        <span class="divider-line"></span>
        <span class="divider-icon">♛</span>
        <span class="divider-line"></span>
      </div>
      <p class="person-desc" data-key="groom.desc"></p>
    </div>
    <div class="petals-container" id="petals3"></div>
  </section>

  <!-- ====== 页面4：新娘特写 ====== -->
  <section class="page page-bride" id="page4">
    <div class="person-bg bride-bg-color"></div>
    <div class="person-photo-wrapper">
      <img id="bridePhoto" src="" alt="新娘" class="person-photo">
      <div class="person-photo-frame"></div>
    </div>
    <div class="person-overlay"></div>
    <div class="person-content">
      <div class="person-label" data-key="bride.title"></div>
      <h2 class="person-name" data-key="bride.name"></h2>
      <p class="person-subtitle" data-key="bride.subtitle"></p>
      <div class="person-divider">
        <span class="divider-line"></span>
        <span class="divider-icon">♛</span>
        <span class="divider-line"></span>
      </div>
      <p class="person-desc" data-key="bride.desc"></p>
    </div>
    <div class="petals-container" id="petals4"></div>
  </section>

  <!-- ====== 页面5：照片墙 ====== -->
  <section class="page page-gallery" id="page5">
    <div class="gallery-bg-img" id="galleryBg"></div>
    <div class="gallery-bg-mask"></div>
    <div class="section-inner">
      <h2 class="section-title">
        <span class="title-ornament">♥</span>
        <span data-key="gallery.title"></span>
        <span class="title-ornament">♥</span>
      </h2>
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
    <div class="petals-container" id="petals5"></div>
  </section>

  <!-- ====== 页面6：婚礼信息 ====== -->
  <section class="page page-info" id="page6">
    <div class="info-bg"></div>
    <div class="section-inner">
      <h2 class="section-title">
        <span class="title-ornament">♥</span>
        <span data-key="info.title"></span>
        <span class="title-ornament">♥</span>
      </h2>

      <!-- 倒计时 -->
      <div class="countdown-card">
        <p class="countdown-label" id="countdownLabel"></p>
        <div class="countdown-timer" id="countdown">
          <div class="countdown-item">
            <span class="countdown-num" id="cd-days">00</span>
            <span class="countdown-unit">天</span>
          </div>
          <span class="countdown-sep">:</span>
          <div class="countdown-item">
            <span class="countdown-num" id="cd-hours">00</span>
            <span class="countdown-unit">时</span>
          </div>
          <span class="countdown-sep">:</span>
          <div class="countdown-item">
            <span class="countdown-num" id="cd-mins">00</span>
            <span class="countdown-unit">分</span>
          </div>
          <span class="countdown-sep">:</span>
          <div class="countdown-item">
            <span class="countdown-num" id="cd-secs">00</span>
            <span class="countdown-unit">秒</span>
          </div>
        </div>
      </div>

      <!-- 婚礼详情文字排版 -->
      <div class="info-detail">
        <div class="info-date-hero">
          <span class="info-date-num">03</span>
          <div class="info-date-meta">
            <span class="info-date-ym" data-key="info.dateYM"></span>
            <span class="info-date-weekday" data-key="info.dateWeekday"></span>
          </div>
        </div>
        <div class="info-detail-sep">
          <span class="info-detail-dot"></span>
          <span class="info-detail-dot"></span>
          <span class="info-detail-dot"></span>
        </div>
        <div class="info-detail-meta">
          <div class="info-detail-row">
            <span class="info-detail-icon icon-calendar"></span>
            <span class="info-detail-val" data-key="info.dateLunar"></span>
          </div>
          <div class="info-detail-row">
            <span class="info-detail-icon icon-clock"></span>
            <span class="info-detail-val" data-key="info.timeFull"></span>
          </div>
        </div>
      </div>

      <!-- 地图预览 -->
      <div class="map-preview" onclick="openMap()">
        <img id="mapPreviewImg" src="" alt="酒店地图" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="map-preview-fallback">
          <span class="map-fallback-icon"></span>
          <span class="map-fallback-text" data-key="info.locationName"></span>
          <span class="map-fallback-sub" data-key="info.locationAddr"></span>
          <span class="map-fallback-hint" data-key="info.mapHint"></span>
        </div>
      </div>
    </div>
    <div class="petals-container" id="petals6"></div>
  </section>

  <!-- ====== 页面7：感谢页 ====== -->
  <section class="page page-thanks" id="page7">
    <div class="thanks-bg"></div>
    <div class="thanks-overlay"></div>
    <div class="section-inner">
      <div class="thanks-frame">
        <div class="cover-ornament top-ornament"></div>
        <h2 class="thanks-title" data-key="thanks.title"></h2>
        <div class="cover-divider">
          <span class="divider-line"></span>
          <span class="divider-icon">♥</span>
          <span class="divider-line"></span>
        </div>
        <p class="thanks-text" data-key="thanks.text"></p>
        <p class="thanks-names" data-key="thanks.names"></p>
        <p class="thanks-date" data-key="thanks.date"></p>
        <div class="cover-ornament bottom-ornament"></div>
      </div>

      <!-- 收款二维码 -->
      <div class="qrcode-section">
        <p class="qrcode-hint">心意打赏，扫码即可</p>
        <div class="qrcode-cards">
          <div class="qrcode-card">
            <img id="qrcodeGroom" src="" alt="新郎收款码">
            <span class="qrcode-label">新郎</span>
          </div>
          <div class="qrcode-card">
            <img id="qrcodeBride" src="" alt="新娘收款码">
            <span class="qrcode-label">新娘</span>
          </div>
        </div>
      </div>
    </div>
    <div class="petals-container" id="petals7"></div>
  </section>

</div>

<!-- 照片灯箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img src="" alt="照片" id="lightboxImg">
  <div class="lightbox-nav">
    <button class="lightbox-prev" onclick="event.stopPropagation(); lightboxNav(-1)">‹</button>
    <button class="lightbox-next" onclick="event.stopPropagation(); lightboxNav(1)">›</button>
  </div>
  <span class="lightbox-counter" id="lightboxCounter"></span>
</div>

<!-- 页面指示器 (7页) -->
<div class="page-indicator" id="pageIndicator">
  <span class="dot active" data-page="0"></span>
  <span class="dot" data-page="1"></span>
  <span class="dot" data-page="2"></span>
  <span class="dot" data-page="3"></span>
  <span class="dot" data-page="4"></span>
  <span class="dot" data-page="5"></span>
  <span class="dot" data-page="6"></span>
</div>

<!-- 先加载配置，再加载逻辑 -->
<script src="js/config.js"></script>
<script src="js/main.js"></script>
</body>
</html>
